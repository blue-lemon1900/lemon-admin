[versions]
spring-boot = "4.0.5"
ip2region = "3.3.4"
redisson = "4.3.0"
redisson-cache = "4.3.0"
lock4j = "2.2.7"
guava = "33.5.0-jre"
commons-io = "2.21.0"
dynamic-datasource = "4.5.0"
p6spy = "3.9.1"
awssdk = "2.28.22"
fastexcel = "1.3.0"
bcprov-jdk15to18 = "1.80"

[libraries]
spring-boot-gradle-plugin = { group = "org.springframework.boot", name = "spring-boot-gradle-plugin", version.ref = "spring-boot" }
ip2region = { group = "org.lionsoul", name = "ip2region", version.ref = "ip2region" }
redisson = { group = "org.redisson", name = "redisson-spring-boot-starter", version.ref = "redisson" }
redisson-cache = { group = "org.redisson", name = "redisson-spring-cache", version.ref = "redisson-cache" }
lock4j = { group = "com.baomidou", name = "lock4j-redisson-spring-boot-starter", version.ref = "lock4j" }
guava = { group = "com.google.guava", name = "guava", version.ref = "guava" }
