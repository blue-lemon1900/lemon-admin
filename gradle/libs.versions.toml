fastexcel = { group = "cn.idev.excel", name = "fastexcel", version.ref = "fastexcel" }
bcprov-jdk15to18 = { group = "org.bouncycastle", name = "bcprov-jdk15to18", version.ref = "bcprov-jdk15to18" }

